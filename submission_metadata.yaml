Team_name: AIndia
Project title: Intelligent Candidate Discovery

Challenge: Redrob Data & AI Challenge

Problem_statement: 
  Build an AI-powered ranking engine that recommends the most suitable
  candidates for a Senior AI Engineer role from 100,000 candidate profiles.

Approach:
  - Skill Matching
  - Title Relevance Scoring
  - Experience Scoring
  - Weighted Final Ranking

Tech_stack:
  - Python
  - Pandas
  - JSON
  - Google Colab

Dataset:
  - candidates.jsonl
  - candidate_schema.json
  - job_description.docx
  - sample_submission.csv

Output:
  - AIndia.csv
